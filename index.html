<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPM - Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-title">Sistem Pengaduan Masyarakat</div>

        <div id="alertMsg" class="alert alert-danger"></div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Username" />
          <div class="err-msg" id="errUser">Username wajib diisi</div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div style="position: relative">
            <input
              type="password"
              id="password"
              placeholder="Password"
              style="width: 100%; box-sizing: border-box; padding-right: 40px"
            />
            <button
              type="button"
              onclick="togglePassword()"
              id="btnToggle"
              style="
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                cursor: pointer;
                padding: 0;
                color: var(--muted);
                font-size: 1rem;
                line-height: 1;
              "
              title="Lihat password"
            >
              &#128065;
            </button>
          </div>
          <div class="err-msg" id="errPass">Password wajib diisi</div>
        </div>
        <button
          class="btn btn-primary"
          style="width: 100%; margin-top: 4px"
          onclick="login()"
        >
          Masuk
        </button>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script>
      if (getSession()) {
        const s = getSession();
        location.href = s.role === "admin" ? "admin.html" : "user.html";
      }

      function login() {
        const uname = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value;
        let ok = true;

        document.getElementById("errUser").classList.remove("show");
        document.getElementById("errPass").classList.remove("show");
        document.getElementById("username").classList.remove("error");
        document.getElementById("password").classList.remove("error");
        document.getElementById("alertMsg").classList.remove("show");

        if (!uname) {
          showErr("username", "errUser");
          ok = false;
        }
        if (!pass) {
          showErr("password", "errPass");
          ok = false;
        }
        if (!ok) return;

        const akun = doLogin(uname, pass);
        if (!akun) {
          const al = document.getElementById("alertMsg");
          al.textContent = "Username atau password salah.";
          al.classList.add("show");
          return;
        }
        location.href = akun.role === "admin" ? "admin.html" : "user.html";
      }

      function togglePassword() {
        const input = document.getElementById("password");
        const btn = document.getElementById("btnToggle");
        if (input.type === "password") {
          input.type = "text";
          btn.style.opacity = "1";
        } else {
          input.type = "password";
          btn.style.opacity = "0.4";
        }
      }

      function showErr(inputId, errId) {
        document.getElementById(inputId).classList.add("error");
        document.getElementById(errId).classList.add("show");
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>
